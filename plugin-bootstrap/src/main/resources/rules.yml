title: "&bDiamond SMP Field Manual"
sections:
  conduct:
    title: "&cProtect The World"
    icon: "&c!"
    lines:
      - "&fDo not grief player builds or hidden bases."
      - "&fSpawn is protected. Keep it clean, safe, and intact."
      - "&fBuild and fight inside the world border only."
      - "&fDo not farm easy kills on fresh or unarmored players."
  cheating:
    title: "&4Fair Play Only"
    icon: "&4X"
    lines:
      - "&fNo hacked clients, scripts, macros, or unfair overlays."
      - "&fNo x-ray, fly, reach, combat assist, or duping."
      - "&fIf a mechanic looks questionable, ask staff before using it."
  progression:
    title: "&bServer Progression"
    icon: "&b*"
    lines:
      - "&fNetherite is removed from standard progression."
      - "&fGod gear is earned through server events and reward villagers."
      - "&fTop-tier enchants stay event-exclusive to keep the season sharp."
  events:
    title: "&aEvent Cycle"
    icon: "&a#"
    lines:
      - "&fWinning live events unlocks limited villager rewards."
      - "&fEvent villagers despawn after 30 minutes, so move fast."
      - "&fPurchased god items retire globally until staff reset the pool."
  economy:
    title: "&eUtility Perks"
    icon: "&e$"
    lines:
      - "&f/string fills empty inventory slots, then goes on cooldown."
      - "&fGolden apple crafting is boosted for faster mid-game recovery."
      - "&fString and cobweb crafting are tuned for PvP utility."
  combat:
    title: "&dCombat Meta"
    icon: "&d+"
    lines:
      - "&fGod swords grant Strength II while held."
      - "&fGod bows reward pressure with a heavy third-hit combo."
      - "&fInfinite Totems are powerful, but always run on cooldown."
